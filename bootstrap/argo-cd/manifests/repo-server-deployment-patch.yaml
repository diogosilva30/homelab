# Based from https://argo-cd.readthedocs.io/en/stable/operator-manual/custom_tools/#adding-tools-via-volume-mounts
# This patch changes the kustomize version to 5.5.0
# This enables support for OCI helm charts in kustomize
# https://github.com/kubernetes-sigs/kustomize/pull/5167

# 1. Define an emptyDir volume which will hold the custom binaries
- op: add
  path: /spec/template/spec/volumes/- # "-" means append to the array
  value:
    # We don't include "-" here because we already appending to the array above
    name: custom-tools
    emptyDir: {}

# 1b. Define an emptyDir volume for Helm registry config generated at runtime
- op: add
  path: /spec/template/spec/volumes/-
  value:
    name: helm-registry-config
    emptyDir: {}

# 2. Use an init container to download/copy custom binaries into the emptyDir
- op: add
  path: /spec/template/spec/initContainers/- # "-" means append to the array
  value:
    # We don't include "-" here because we already appending to the array above
    name: download-kustomize-v5-5-0
    image: alpine:3.8
    command: [sh, -c]
    args:
      - wget -qO- https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.5.0/kustomize_v5.5.0_linux_amd64.tar.gz | tar -xvzf - &&
        mkdir -p /custom-tools/ &&
        mv kustomize /custom-tools/kustomize_5_5_0
    volumeMounts:
      - mountPath: /custom-tools
        name: custom-tools

# 2b. Login to GHCR and materialize Helm registry config for kustomize --enable-helm pulls
- op: add
  path: /spec/template/spec/initContainers/-
  value:
    name: create-helm-registry-config
    image: quay.io/argoproj/argocd:v3.3.6
    command: [sh, -c]
    args:
      - |
        helm registry login ghcr.io \
          --username "$GHCR_USERNAME" \
          --password "$GHCR_PASSWORD" \
          --registry-config /helm-auth/registry/config.json
    env:
      - name: GHCR_USERNAME
        valueFrom:
          secretKeyRef:
            name: ghcr-oci-repo
            key: username
      - name: GHCR_PASSWORD
        valueFrom:
          secretKeyRef:
            name: ghcr-oci-repo
            key: password
    volumeMounts:
      - mountPath: /helm-auth
        name: helm-registry-config

# 3. Volume mount the custom binary to the bin directory (overriding the existing version)
- op: add
  path: /spec/template/spec/containers/0/volumeMounts/- # "-" means append to the array
  value:
    # We don't include "-" here because we already appending to the array above
    mountPath: /usr/local/bin/kustomize
    name: custom-tools
    subPath: kustomize_5_5_0

# 4. Mount Helm registry config and point Helm at it
- op: add
  path: /spec/template/spec/containers/0/volumeMounts/-
  value:
    mountPath: /helm-auth
    name: helm-registry-config

- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: HELM_CONFIG_HOME
    value: /helm-auth

- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: HELM_REGISTRY_CONFIG
    value: /helm-auth/registry/config.json
