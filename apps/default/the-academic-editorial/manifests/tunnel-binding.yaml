apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: the-academic-editorial-tunnel-binding
subjects:
  - kind: Service
    name: backend
    spec:
      fqdn: academic-editorial.$(DNS)
      # Route API/admin requests to Django backend service.
      path: "^/(api|admin)(/.*)?$"
  - kind: Service
    name: backend-nginx-files
    spec:
      fqdn: academic-editorial.$(DNS)
      # Route static/media paths to the dedicated files service.
      path: "^/(media|static)(/.*)?$"
  - kind: Service
    name: academic-editorial
    spec:
      fqdn: academic-editorial.$(DNS)
tunnelRef:
  kind: ClusterTunnel
  name: homelab-cluster-tunnel
