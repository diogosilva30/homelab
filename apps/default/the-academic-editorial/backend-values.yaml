image:
  repository: ghcr.io/diogosilva30/the-academic-editorial/backend
  tag: "1.36.0"
  pullPolicy: Always

replicaCount: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: false

env:
  - name: DJANGO_CONFIGURATION
    value: "Prod"
  - name: DJANGO_ALLOWED_HOSTS
    value: "*"

envFrom:
  - secretRef:
      name: academic-editorial-backend-env

media:
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 5Gi
    storageClassName: ""
    existingClaim: ""
    mountPath: /app/media
    staticMountPath: /app/static
    staticSubPath: static

llmProxy:
  enabled: true
  image:
    repository: ghcr.io/caozhiyuan/copilot-api
    tag: latest
    pullPolicy: IfNotPresent
  accountType: business
  ghTokenSecret:
    name: "gh-copilot-api-token"
    key: GH_TOKEN
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""

profiles:
  gitSync:
    enabled: true
    image:
      repository: registry.k8s.io/git-sync/git-sync
      tag: "v4.3.0"
      pullPolicy: IfNotPresent
    repo: "https://github.com/diogosilva30/the-academic-editorial.git"
    branch: main
    depth: 1
    syncIntervalSeconds: 300
    # Path where the repo's profiles subtree is mounted in the backend container.
    mountPath: /profiles
    # Subdirectory inside the synced repository to expose at mountPath.
    repoSubPath: profiles
    auth:
      enabled: true
      # Kubernetes Secret containing a git token (HTTPS auth).
      tokenSecretName: gitsync-token
      tokenKey: GH_TOKEN
      # Username used with token auth (for GitHub, x-access-token is recommended).
      username: x-access-token

api:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  probes:
    readiness:
      tcpSocket:
        port: http
      initialDelaySeconds: 15
      periodSeconds: 10
    liveness:
      tcpSocket:
        port: http
      initialDelaySeconds: 30
      periodSeconds: 15

celeryWorker:
  enabled: true
  replicaCount: 1
  command:
    - celery
    - -A
    - backend
    - worker
    - --loglevel=INFO
    - --concurrency=2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 2Gi

redis:
  enabled: true
  image:
    registry: docker.io
    repository: bitnami/redis
    tag: latest
  connection:
    host: ""
    port: 6379
  auth:
    enabled: false
  architecture: standalone
  master:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
  brokerDb: 0
  resultBackendDb: 1

nginxFiles:
  enabled: true
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
