image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

api:
  probes:
    readiness: {}
    liveness: {}
  resources: {}

ingress:
  enabled: true
  className: ""
  annotations: {}
  hosts:
    - host: ""
      paths:
        - path: /api
          pathType: Prefix

env:
  - name: DJANGO_CONFIGURATION
    value: "Prod"
  - name: ALLOWED_HOSTS
    value: "*"

media:
  persistence:
    enabled: false
    # Default is RWO for broad compatibility (e.g. local-path).
    # Set RWX only when your storage class supports it.
    accessModes:
      - ReadWriteOnce
    size: 5Gi
    storageClassName: ""
    # Optional pre-created PVC name. When empty, the chart creates one.
    existingClaim: ""
    mountPath: /app/media
    staticMountPath: /app/static
    staticSubPath: static

celeryWorker:
  enabled: false
  replicaCount: 1
  image:
    repository: ""
    tag: ""
    pullPolicy: ""
  command:
    - celery
    - -A
    - backend
    - worker
    - --loglevel=INFO
    - --concurrency=2
  env: []
  resources: {}

redis:
  enabled: false
  image:
    registry: docker.io
    repository: bitnami/redis
    tag: latest
  connection:
    # Optional explicit Redis hostname override.
    host: ""
    port: 6379
  auth:
    enabled: false
  architecture: standalone
  master:
    persistence:
      enabled: false
  brokerDb: 0
  resultBackendDb: 1
  resources: {}

nginxFiles:
  enabled: false
  replicaCount: 1
  image:
    repository: nginx
    tag: "1.27-alpine"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  resources: {}
  cacheControl: public, max-age=31536000, immutable

llmProxy:
  enabled: false
  image:
    repository: ghcr.io/caozhiyuan/copilot-api
    tag: v1.5.5
    pullPolicy: IfNotPresent
  accountType: business
  # Prefer secretRef in production. Inline value is kept for local/dev convenience.
  ghToken: ""
  ghTokenSecret:
    name: ""
    key: GH_TOKEN
  service:
    type: ClusterIP
    port: 4141
    targetPort: 4141
  resources: {}
  persistence:
    enabled: false
    size: 1Gi
    storageClassName: ""

profiles:
  gitSync:
    enabled: false
    image:
      repository: registry.k8s.io/git-sync/git-sync
      tag: "v4.3.0"
      pullPolicy: IfNotPresent
    repo: ""
    branch: main
    depth: 1
    syncIntervalSeconds: 300
    # Path where the repo's profiles subtree is mounted in the backend container.
    mountPath: /profiles
    # Subdirectory inside the synced repository to expose at mountPath.
    repoSubPath: profiles
    auth:
      enabled: false
      # Kubernetes Secret containing a git token (HTTPS auth).
      tokenSecretName: ""
      tokenKey: token
      # Username used with token auth (for GitHub, x-access-token is recommended).
      username: x-access-token
